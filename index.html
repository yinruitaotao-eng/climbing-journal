<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>派大涛·攀岩日记</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garant:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --warm-white:#FAFAF8;--charcoal:#222;--sage:#7C9082;--sage-light:#A8BBA0;
  --stone:#9A9A9A;--sand:#D4C5B2;--sand-light:#EDE8E0;--cream:#F5F2ED;
  --bg:var(--warm-white);--bg2:#fff;--bg3:var(--cream);
  --text:var(--charcoal);--text2:#555;--text3:var(--stone);
  --accent:var(--sage);--accent-bg:rgba(124,144,130,.07);
  --border:rgba(0,0,0,.06);--shadow-s:0 1px 8px rgba(0,0,0,.04);
  --shadow-m:0 4px 24px rgba(0,0,0,.06);--shadow-l:0 12px 48px rgba(0,0,0,.08);
  --serif:'Cormorant Garant',Georgia,'Noto Serif SC',serif;
  --quote:'Lora','Cormorant Garant',Georgia,serif;
  --sans:'Inter',-apple-system,'SF Pro Text','PingFang SC','Noto Sans SC',system-ui,sans-serif;
  --mastered:var(--sage);--practicing:#C4A35A;--locked:var(--sand);
}
[data-theme="dark"]{
  --warm-white:#141413;--charcoal:#EDE9E3;--cream:#1E1E1C;--sand-light:#2A2A28;
  --bg:var(--warm-white);--bg2:#1A1A18;--bg3:var(--cream);
  --text:var(--charcoal);--text2:#A09A92;--text3:#6B665E;
  --border:rgba(255,255,255,.06);--shadow-s:0 1px 8px rgba(0,0,0,.2);
  --shadow-m:0 4px 24px rgba(0,0,0,.3);--shadow-l:0 12px 48px rgba(0,0,0,.4);
  --accent-bg:rgba(124,144,130,.1);
}
html{scroll-behavior:smooth;background:var(--bg);color:var(--text);
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  font-family:var(--sans);font-size:16px;line-height:1.7;transition:background .5s,color .5s}
body{min-height:100vh;overflow-x:hidden}
img{max-width:100%;display:block}
a{color:var(--accent);text-decoration:none}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:0 32px;height:56px;
  display:flex;align-items:center;justify-content:space-between;
  background:transparent;transition:background .4s,backdrop-filter .4s}
.nav.scrolled{background:rgba(250,250,248,.82);backdrop-filter:blur(20px) saturate(1.4);
  -webkit-backdrop-filter:blur(20px) saturate(1.4);border-bottom:1px solid var(--border)}
[data-theme="dark"] .nav.scrolled{background:rgba(20,20,19,.82)}
.nav-brand{font-family:var(--serif);font-size:15px;font-weight:500;letter-spacing:.06em;
  text-transform:uppercase;color:var(--text2)}
.nav-right{display:flex;align-items:center;gap:28px}
.nav-right a{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);font-weight:500;transition:color .2s}
.nav-right a:hover{color:var(--text)}
.theme-btn{width:28px;height:28px;border:none;background:none;cursor:pointer;color:var(--text3);
  font-size:16px;display:flex;align-items:center;justify-content:center;transition:color .2s}
.theme-btn:hover{color:var(--text)}

/* COVER */
.cover{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;
  padding:80px 32px 60px;text-align:center;position:relative}
.cover-eyebrow{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--stone);
  font-weight:500;margin-bottom:24px}
.cover h1{font-family:var(--serif);font-size:clamp(42px,8vw,72px);font-weight:300;
  letter-spacing:-.02em;line-height:1.08;margin-bottom:32px;color:var(--text)}
.cover-line{width:40px;height:1px;background:var(--sand);margin:0 auto 32px}
.cover-quote{font-family:var(--quote);font-size:clamp(17px,2.8vw,22px);font-style:italic;
  color:var(--text2);line-height:1.7;max-width:520px;margin:0 auto 48px}
.cover-meta{display:flex;gap:40px;justify-content:center;flex-wrap:wrap}
.cover-meta-item{text-align:center}
.cover-meta-num{font-family:var(--serif);font-size:36px;font-weight:300;color:var(--text);line-height:1}
.cover-meta-label{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--stone);margin-top:6px}
.cover-scroll{position:absolute;bottom:32px;left:50%;transform:translateX(-50%);
  font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--sand);
  animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(6px)}}

/* CHAPTER */
.chapter{padding:100px 32px 80px;max-width:960px;margin:0 auto}
.chapter-head{margin-bottom:48px}
.chapter-num{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--stone);
  font-weight:500;margin-bottom:12px;display:block}
.chapter-date{font-family:var(--serif);font-size:clamp(28px,5vw,44px);font-weight:300;
  color:var(--text);letter-spacing:-.01em;margin-bottom:8px}
.chapter-subtitle{font-size:15px;color:var(--text2);font-weight:400;letter-spacing:.01em}
.chapter-divider{width:100%;height:1px;background:var(--border);margin:80px 0}

/* PHOTO — Polaroid / Scrapbook Style */
.photo-strip{display:flex;flex-wrap:wrap;gap:20px;margin:40px 0;align-items:flex-end;
  justify-content:center;position:relative}
.photo-frame{background:#fff;padding:7px 7px 30px;border-radius:2px;position:relative;
  box-shadow:0 2px 12px rgba(0,0,0,.08),0 1px 3px rgba(0,0,0,.05);cursor:zoom-in;
  transition:transform .35s cubic-bezier(.34,1.56,.64,1),box-shadow .3s ease;
  max-width:260px;overflow:visible}
[data-theme="dark"] .photo-frame{background:#2A2A28;box-shadow:0 2px 16px rgba(0,0,0,.35)}
.photo-frame:hover{transform:scale(1.05) translateY(-4px);
  box-shadow:0 8px 28px rgba(0,0,0,.12);z-index:10}
.photo-frame img{width:100%;height:auto;display:block;border-radius:1px;
  aspect-ratio:4/3;object-fit:cover}
.photo-frame .photo-caption{position:absolute;bottom:8px;left:7px;right:7px;
  font-size:11px;color:var(--stone);text-align:center;font-style:italic;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:0}

/* Single photo — centered, slightly larger */
.photo-frame.single{max-width:360px;margin:40px auto;display:block}

/* Size variants for visual rhythm */
.photo-frame.small{max-width:180px}
.photo-frame.medium{max-width:240px}
.photo-frame.large{max-width:280px}

/* Caption row */
.photo-caption-row{font-size:12px;color:var(--stone);margin-top:8px;font-style:italic;
  letter-spacing:.01em;max-width:680px;text-align:center}

/* CONTENT BLOCKS */
.prose{max-width:680px;font-size:17px;line-height:1.85;color:var(--text2)}
.prose p{margin-bottom:20px}
.breakthrough{max-width:680px;margin:40px 0;padding:24px 0;border-top:1px solid var(--border)}
.breakthrough-label{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--sage);
  font-weight:600;margin-bottom:10px}
.breakthrough-text{font-family:var(--serif);font-size:clamp(22px,3.5vw,30px);font-weight:400;
  line-height:1.35;color:var(--text)}

/* QUOTE / FEELING */
.quote-block{max-width:580px;margin:56px 0;padding:0}
.quote-text{font-family:var(--quote);font-size:clamp(20px,3.2vw,26px);font-weight:400;
  line-height:1.75;color:var(--text);font-style:normal;white-space:pre-wrap;word-break:break-word}
.quote-mark{font-family:var(--serif);font-size:64px;line-height:1;color:var(--sand);margin-bottom:-8px;
  user-select:none}

/* SKILLS TAGS */
.skills-row{display:flex;flex-wrap:wrap;gap:8px;margin:32px 0;max-width:680px}
.skill-tag{font-size:12px;padding:6px 16px;border:1px solid var(--border);border-radius:24px;
  color:var(--text2);font-weight:500;letter-spacing:.02em;background:var(--bg2);
  transition:background .2s,border-color .2s}
.skill-tag:hover{border-color:var(--sage);background:var(--accent-bg)}

/* COACH SECTIONS */
.coach-block{max-width:680px;margin:40px 0}
.coach-label{font-size:10px;letter-spacing:.18em;text-transform:uppercase;font-weight:600;margin-bottom:12px}
.coach-label.guidance-label{color:var(--sage)}
.coach-label.feedback-label{color:var(--practicing)}
.coach-label.goal-label{color:var(--stone)}
.coach-text{font-size:15px;line-height:1.8;color:var(--text2);padding:20px 24px;
  background:var(--bg3);border-radius:10px;border-left:2px solid var(--border)}
.coach-text.guidance{border-left-color:var(--sage-light)}
.coach-text.feedback{border-left-color:var(--practicing)}
.coach-goal{font-size:15px;line-height:1.8;color:var(--text2);
  padding:16px 24px;background:var(--accent-bg);border-radius:10px}

/* collapsible guidance */
.guidance-wrap{max-width:680px;margin:32px 0}
.guidance-toggle{display:flex;align-items:center;gap:10px;width:100%;padding:14px 20px;border:1px dashed var(--sage-light);
  background:var(--accent-bg);border-radius:10px;cursor:pointer;font-family:var(--sans);
  font-size:13px;font-weight:500;color:var(--sage);letter-spacing:.04em;text-align:left;transition:background .2s}
.guidance-toggle:hover{background:rgba(124,144,130,.12)}
.guidance-toggle .chevron{margin-left:auto;transition:transform .3s;font-size:10px}
.guidance-wrap.open .guidance-toggle .chevron{transform:rotate(180deg)}
.guidance-body{max-height:0;overflow:hidden;transition:max-height .45s ease}
.guidance-wrap.open .guidance-body{max-height:800px}
.guidance-body .coach-text{margin-top:12px}

/* STARS */
.stars{display:flex;gap:4px;margin:24px 0}
.star{width:8px;height:8px;border-radius:50%;background:var(--sand)}
.star.on{background:var(--sage)}

/* SKILL MAP */
.skill-map{padding:100px 32px 60px;max-width:960px;margin:0 auto}
.map-title{font-family:var(--serif);font-size:clamp(28px,5vw,40px);font-weight:300;
  text-align:center;margin-bottom:12px;color:var(--text)}
.map-sub{font-size:14px;color:var(--stone);text-align:center;margin-bottom:60px;letter-spacing:.04em}
.map-category{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
  padding:28px;margin-bottom:24px;box-shadow:var(--shadow-s)}
.map-cat-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:20px;
  padding-bottom:12px;border-bottom:1px solid var(--border)}
.map-cat-name{font-family:var(--serif);font-size:22px;font-weight:500;color:var(--text)}
.map-cat-count{font-size:12px;color:var(--stone);letter-spacing:.06em}
.map-group{margin-bottom:16px}
.map-group:last-child{margin-bottom:0}
.map-group-name{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--stone);
  font-weight:500;margin-bottom:10px}
.map-items{display:flex;flex-wrap:wrap;gap:6px 16px}
.map-item{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2)}
.map-item.mastered{color:var(--text);font-weight:500}
.map-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.map-dot.mastered{background:var(--mastered)}
.map-dot.practicing{background:var(--practicing)}
.map-dot.locked{background:var(--locked)}
.map-legend{display:flex;gap:24px;justify-content:center;margin-bottom:48px;flex-wrap:wrap}
.legend{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--stone)}

/* LIGHTBOX */
.lightbox{position:fixed;inset:0;z-index:1000;background:rgba(20,20,19,.94);display:none;
  align-items:center;justify-content:center;opacity:0;transition:opacity .35s}
.lightbox.active{display:flex;opacity:1}
.lightbox img{max-width:92vw;max-height:88vh;object-fit:contain;border-radius:6px}
.lb-close{position:fixed;top:20px;right:24px;width:40px;height:40px;border:none;
  background:rgba(255,255,255,.08);border-radius:50%;cursor:pointer;color:#fff;font-size:20px;
  display:flex;align-items:center;justify-content:center;transition:background .2s}
.lb-close:hover{background:rgba(255,255,255,.16)}

/* BTT */
.btt{position:fixed;bottom:28px;right:28px;width:40px;height:40px;border-radius:50%;border:1px solid var(--border);
  background:var(--bg2);cursor:pointer;font-size:14px;color:var(--text3);
  display:flex;align-items:center;justify-content:center;
  opacity:0;transform:translateY(16px);pointer-events:none;transition:all .3s;z-index:50}
.btt.show{opacity:1;transform:translateY(0);pointer-events:auto}
.btt:hover{border-color:var(--sage);color:var(--sage)}

/* FOOTER */
.footer{text-align:center;padding:80px 32px 48px}
.footer-text{font-size:12px;color:var(--stone);letter-spacing:.08em}

/* SCROLL REVEAL */
.reveal{opacity:0;transform:translateY(28px);transition:opacity .7s cubic-bezier(.25,.46,.45,.94),
  transform .7s cubic-bezier(.25,.46,.45,.94)}
.reveal.vis{opacity:1;transform:translateY(0)}
.reveal-delay-1{transition-delay:.1s}
.reveal-delay-2{transition-delay:.2s}
.reveal-delay-3{transition-delay:.3s}

/* ===== ART DIRECTOR ENHANCEMENTS ===== */

/* 3. Reading Progress Bar */
.progress-bar{position:fixed;top:0;left:0;height:2px;background:var(--sage);z-index:200;
  width:0%;transition:width .1s linear;pointer-events:none}

/* 2. Film Grain Texture */
body::after{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;opacity:.035;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:128px 128px}
[data-theme="dark"] body::after{opacity:.025}

/* 1. Cover Watermark */
.cover-watermark{position:absolute;font-family:var(--serif);font-size:clamp(200px,35vw,380px);
  font-weight:300;color:var(--text);opacity:.03;line-height:1;top:50%;left:50%;
  transform:translate(-50%,-50%);pointer-events:none;user-select:none;z-index:0;
  letter-spacing:-.04em}

/* 4. Cover Meta Dividers */
.cover-meta-divider{width:1px;height:32px;background:var(--sand);opacity:.5;align-self:center}

/* 5. Chapter Watermark Number */
.chapter-watermark{position:absolute;top:-20px;right:-10px;font-family:var(--serif);
  font-size:clamp(120px,18vw,200px);font-weight:300;color:var(--text);opacity:.025;
  line-height:1;pointer-events:none;user-select:none;z-index:0;letter-spacing:-.03em}
.chapter{position:relative;overflow:hidden}

/* 6. Vertical Date Label */
.chapter-date-vert{writing-mode:vertical-rl;text-orientation:mixed;position:absolute;
  top:100px;left:8px;font-family:var(--sans);font-size:10px;letter-spacing:.15em;
  text-transform:uppercase;color:var(--stone);opacity:.2;font-weight:400;z-index:0}
@media(max-width:1100px){.chapter-date-vert{display:none}}

/* 7. Alternating Chapter Backgrounds */
.chapter:nth-child(even){background:var(--bg3)}
.chapter:nth-child(even)::before{content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,var(--bg) 0%,transparent 80px,transparent calc(100% - 80px),var(--bg) 100%);
  pointer-events:none;z-index:0}
.chapter>*{position:relative;z-index:1}

/* 8. Decorative Chapter Divider */
.chapter-divider{background:none;height:auto;margin:0;padding:48px 0;display:flex;
  align-items:center;justify-content:center}
.chapter-divider::before{content:'✦';font-size:10px;color:var(--sand);letter-spacing:1em;
  opacity:.6}

/* 9. Chapter Left Accent Line */
.chapter-accent{position:absolute;top:80px;bottom:80px;left:0;width:2px;
  background:linear-gradient(180deg,transparent,var(--sage-light),transparent);opacity:.3}

/* 10. Drop Cap for Feeling */
.feeling-text::first-letter{font-family:var(--serif);font-size:3.2em;float:left;
  line-height:.85;margin-right:8px;margin-top:4px;font-weight:400;color:var(--accent)}

/* 11. Quote Decoration Gradients */
.quote-block{position:relative}
.quote-block::before{content:'';position:absolute;top:-24px;left:0;width:60px;height:1px;
  background:linear-gradient(90deg,var(--sage-light),transparent)}
.quote-block::after{content:'';position:absolute;bottom:-24px;left:0;width:40px;height:1px;
  background:linear-gradient(90deg,var(--sand),transparent)}

/* 12. Feeling Left Emphasis Line */
.quote-block{padding-left:28px;border-left:3px solid var(--sage-light)}
.quote-mark{margin-left:-28px}

/* 13. Feeling Text Size Boost */
.quote-text{font-size:clamp(22px,3.4vw,28px)}

/* 14. Staggered Polaroid Reveal */
.photo-strip .photo-frame{opacity:0;transition:opacity .5s ease,transform .35s cubic-bezier(.34,1.56,.64,1),box-shadow .3s ease}
.photo-strip.vis .photo-frame{opacity:1}
.photo-strip.vis .photo-frame:nth-child(1){transition-delay:0s}
.photo-strip.vis .photo-frame:nth-child(2){transition-delay:.1s}
.photo-strip.vis .photo-frame:nth-child(3){transition-delay:.2s}
.photo-strip.vis .photo-frame:nth-child(4){transition-delay:.3s}
.photo-strip.vis .photo-frame:nth-child(5){transition-delay:.38s}

/* 15. (stagger integrated into #14 above) */

/* 16. Lightbox Scale Entrance */
.lightbox img{transform:scale(.92);transition:transform .4s cubic-bezier(.22,1,.36,1),opacity .35s}
.lightbox.active img{transform:scale(1)}

/* 17. Polaroid Soft Shadow (replaces vignette) */
/* shadow already handled by .photo-frame box-shadow */

/* 18. Mastered Skill Subtle Glow */
@keyframes masteredPulse{0%,100%{opacity:.6}50%{opacity:1}}
.map-dot.mastered{animation:masteredPulse 3s ease-in-out infinite}

/* 19. Skill Tag Hover Elastic */
.skill-tag{transition:background .2s,border-color .2s,transform .3s cubic-bezier(.34,1.56,.64,1)}
.skill-tag:hover{transform:scale(1.06)}

/* 20. Map Category Hover Lift */
.map-category{transition:transform .4s ease,box-shadow .4s ease}
.map-category:hover{transform:translateY(-3px);box-shadow:var(--shadow-m)}

/* 21. Nav Link Underline Animation */
.nav-right a{position:relative;overflow:hidden}
.nav-right a::after{content:'';position:absolute;bottom:-2px;left:0;width:0;height:1px;
  background:var(--sage);transition:width .35s ease}
.nav-right a:hover::after{width:100%}

/* 22. Smooth Theme Transition (enhance existing) */
html{transition:background .5s ease,color .5s ease}
.nav,.nav-brand,.nav-right a,.theme-btn,.chapter,.chapter-head,.chapter-date,.chapter-subtitle,
.chapter-num,.breakthrough-text,.quote-text,.quote-mark,.coach-text,.coach-goal,.coach-label,
.skill-tag,.map-category,.map-cat-name,.map-item,.guidance-toggle,.cover-eyebrow,.cover h1,
.cover-quote,.cover-meta-num,.cover-meta-label,.footer-text,.prose{
  transition:background-color .45s ease,color .45s ease,border-color .45s ease}

/* 23. Breakthrough Text Enhancement */
.breakthrough-text{background:linear-gradient(135deg,var(--text) 0%,var(--sage) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text}
[data-theme="dark"] .breakthrough-text{background:linear-gradient(135deg,var(--text) 0%,var(--sage-light) 100%);
  -webkit-background-clip:text;background-clip:text}

/* 24. Footer Decorative Line */
.footer{position:relative}
.footer::before{content:'';display:block;width:60px;height:1px;background:var(--sand);
  margin:0 auto 40px;opacity:.5}

/* 25. Cover Scroll Indicator Enhancement */
.cover-scroll{display:flex;flex-direction:column;align-items:center;gap:8px}
.cover-scroll::after{content:'';width:1px;height:24px;background:linear-gradient(180deg,var(--sand),transparent);
  animation:scrollLine 2s ease-in-out infinite}
@keyframes scrollLine{0%{opacity:0;transform:scaleY(0);transform-origin:top}
  50%{opacity:1;transform:scaleY(1)}100%{opacity:0;transform:scaleY(1)}}

/* RESPONSIVE */
@media(max-width:768px){
  .nav{padding:0 20px;height:48px}
  .nav-right{gap:16px}
  .cover{padding:72px 24px 48px}
  .cover-meta{gap:24px}
  .chapter{padding:64px 20px 48px}
  .chapter-divider{margin:48px 0}
  .quote-text{font-size:19px}
  .photo-strip{gap:14px;justify-content:center}
  .photo-frame{max-width:45%!important}
  .photo-frame.single{max-width:80%!important}
  .skill-map{padding:64px 20px 40px}
  .prose{font-size:16px}
}
@media(max-width:480px){
  .cover h1{font-size:36px}
  .chapter-date{font-size:24px}
  .cover-meta-num{font-size:28px}
  .photo-frame{max-width:100%!important}
  .photo-frame.single{max-width:100%!important}
}
</style>
</head>
<body>
<div class="progress-bar" id="progress"></div>

<nav class="nav" id="nav">
  <span class="nav-brand">Climbing Journal</span>
  <div class="nav-right">
    <a href="#chapters">日记</a>
    <a href="#skill-map">成长</a>

function fmtDate(d){var p=d.split('-');return p[0]+'\u5E74'+parseInt(p[1])+'\u6708'+parseInt(p[2])+'\u65E5'}
function starDots(lv){var h='';for(var i=0;i<5;i++)h+='<span class="star'+(i<lv?' on':'')+'"></span>';return h}

function renderPhotos(t){
  if(!t.photos.length)return '';
  var sizes=['medium','large','small','medium','large'];
  if(t.photos.length===1){
    var cap=t.captions[0]?'<div class="photo-caption">'+t.captions[0]+'</div>':'';
    return '<div class="photo-frame single reveal" onclick="openLB(\''+P+t.photos[0]+'\')">'
      +'<img src="'+P+t.photos[0]+'" alt="" loading="lazy">'+cap+'</div>';
  }
  var frames=t.photos.map(function(p,i){
    var sz=sizes[i%sizes.length];
    var cap=t.captions[i]?'<div class="photo-caption">'+t.captions[i]+'</div>':'';
    return '<div class="photo-frame '+sz+'" onclick="openLB(\''+P+p+'\')">'
      +'<img src="'+P+p+'" alt="" loading="lazy">'+cap+'</div>';
  }).join('');
  return '<div class="photo-strip reveal">'+frames+'</div>';
}

function renderMap(){
  var el=document.getElementById('map-container');
  el.innerHTML=ST.map(function(cat){
    var total=0,mastered=0;
    cat.items.forEach(function(g){g.s.forEach(function(s){total++;if(s[1]==='m')mastered++})});
    var groups=cat.items.map(function(g){
      var items=g.s.map(function(s){
        var cls=s[1]==='m'?'mastered':s[1]==='p'?'practicing':'locked';
        return '<span class="map-item '+cls+'"><span class="map-dot '+cls+'"></span>'+s[0]+'</span>';
      }).join('');
      return '<div class="map-group"><div class="map-group-name">'+g.g+'</div><div class="map-items">'+items+'</div></div>';
    }).join('');
    return '<div class="map-category reveal"><div class="map-cat-head"><span class="map-cat-name">'+cat.icon+' '+cat.name+'</span><span class="map-cat-count">'+mastered+'/'+total+'</span></div>'+groups+'</div>';
  }).join('');
}

function openLB(src){var lb=document.getElementById('lb');document.getElementById('lb-img').src=src;lb.classList.add('active');document.body.style.overflow='hidden'}
function closeLB(){document.getElementById('lb').classList.remove('active');document.body.style.overflow=''}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeLB()});

function toggleTheme(){
  var h=document.documentElement,d=h.getAttribute('data-theme')==='dark';
  h.setAttribute('data-theme',d?'light':'dark');
  document.querySelector('.theme-btn').innerHTML=d?'&#9789;':'&#9788;';
}

function initScroll(){
  var nav=document.getElementById('nav');
  var btt=document.getElementById('btt');
  var prog=document.getElementById('progress');
  window.addEventListener('scroll',function(){
    nav.classList.toggle('scrolled',window.scrollY>60);
    btt.classList.toggle('show',window.scrollY>500);
    var pct=window.scrollY/(document.documentElement.scrollHeight-window.innerHeight)*100;
    prog.style.width=Math.min(pct,100)+'%';
  },{passive:true});
  var obs=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting)e.target.classList.add('vis')})},{threshold:.08,rootMargin:'0px 0px -30px 0px'});
  document.querySelectorAll('.reveal').forEach(function(el){obs.observe(el)});
  var photoObs=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){e.target.classList.add('vis');photoObs.unobserve(e.target)}})},{threshold:.15});
  document.querySelectorAll('.photo-strip').forEach(function(el){photoObs.observe(el)});
}

renderChapters();
renderMap();
requestAnimationFrame(function(){initScroll()});
